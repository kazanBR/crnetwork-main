<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>Phone Bank Capital</title>
  </head>
  <body>
    <section id="phone-bank">
      <div class="app" id="content">
        <!-- Menu principal -->
        <div class="main">
          <div id="load-main" class="loading" style="margin-top: 25rem">
            <i class="fa-solid fa-spinner"></i>
          </div>
        </div>
        <!-- Pix -->
        <div class="pix" style="display: none">
          <button id="close"><i class="fas fa-xmark"></i></button>
          <span class="pix-title">Pix</span>
          <div class="pix-buttons"></div>

          <div class="pix-box" style="display: none"></div>

          <div id="request-pix" class="request" style="display: none"></div>

          <div id="load-pix" class="loading" style="display: none">
            <i class="fa-solid fa-spinner"></i>
            <span id="load-text">Transferindo...</span>
          </div>
        </div>
        <!-- Transferência -->
        <div class="transfer" style="display: none">
          <button id="close"><i class="fas fa-xmark"></i></button>
          <span class="transfer-title">Transferência</span>
          <div class="transfer-box">
            <span>Envie o seu dinheiro!</span>
            <form>
              <label for="input-trans">Passaporte</label>
              <input type="number" id="input-trans" class="input" value="" />
              <label for="input-trans-value" style="margin-top: 0.5rem"
                >Valor</label
              >
              <input
                type="number"
                id="input-trans-value"
                class="input"
                value=""
              />
            </form>
            <button id="transfer-send">Enviar</button>
          </div>

          <div id="request-trans" class="request" style="display: none"></div>

          <div id="load-trans" class="loading" style="display: none">
            <i class="fa-solid fa-spinner"></i>
            <span id="load-text">Transferindo...</span>
          </div>
        </div>
        <!-- Multas -->
        <div class="fines" style="display: none">
          <button id="close"><i class="fas fa-xmark"></i></button>
          <span class="fines-title">Multas</span>
          <ul id="fines-list"></ul>
          <div id="load-fine" class="loading" style="display: none">
            <i class="fa-solid fa-spinner"></i>
            <span id="load-text">Pagando...</span>
          </div>
        </div>
        <!-- Detalhes da Multa -->
        <div class="fines-detail" style="display: none">
          <button id="close" data-previous=".fines">
            <i class="fas fa-xmark"></i>
          </button>
          <span class="fines-title">Detalhes da multa</span>
          <ul class="fines-box"></ul>
        </div>
      </div>
    </section>
    <script
      src="https://code.jquery.com/jquery-3.6.1.min.js"
      integrity="sha256-o88AwQnZB+VDvE9tvIXrMQaPlFFSUTR+nldQm1LuPXQ="
      crossorigin="anonymous"
    ></script>
    <script
      src="https://kit.fontawesome.com/ad2a21936d.js"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
    <script src="dev.js"></script>
  </body>
</html>
