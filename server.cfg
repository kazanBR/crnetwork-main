################################################################################
# Creative Network - Configuração do Servidor FiveM
################################################################################
# ------------------------------------------------------------------------------
# CONFIGURAÇÃO DE REDE E PORTA
# ------------------------------------------------------------------------------
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"
# ------------------------------------------------------------------------------
# CONFIGURAÇÃO DO BANCO DE DADOS
# ------------------------------------------------------------------------------
# Formato: mysql://usuario:senha@host:porta/nome_banco
# IMPORTANTE: Configure sua senha do MariaDB aqui
set mysql_connection_string "mysql://SEULOGIN:SUASENHA@localhost:3306/SUADB?charset=utf8mb4"
set mysql_slow_query_warning 150
# ------------------------------------------------------------------------------
# RECURSOS DO SERVIDOR
# ------------------------------------------------------------------------------
start vrp
start [system]
start [weapons]
start [scripts]
start [smartphone]
start [maps]
# ------------------------------------------------------------------------------
# CONFIGURAÇÕES DE SEGURANÇA
# ------------------------------------------------------------------------------
sv_scriptHookAllowed 0
sv_endpointprivacy true
# ------------------------------------------------------------------------------
# RCON (Remote Console)
# ------------------------------------------------------------------------------
# Descomente e configure uma senha para o RCON
#rcon_password "SUA_SENHA_RCON_AQUI"
# ------------------------------------------------------------------------------
# TAGS E LOCALIZAÇÃO
# ------------------------------------------------------------------------------
sets tags "rp, roleplay, creative, network, pvp, br, brasil, brazil, otimizado, fps, foguete, lotus, complexo, santa, paris, tokyo, fusion, space, disney, infinity, fluxo, havana, kush, dubai, brazuka, nexus, capital, one, street, north, meta"
sets locale "pt-BR"
# ------------------------------------------------------------------------------
# ÍCONE DO SERVIDOR
# ------------------------------------------------------------------------------
load_server_icon server.png
# ------------------------------------------------------------------------------
# MASTER SERVER
# ------------------------------------------------------------------------------
# Deixe vazio para usar o master server padrão do FiveM
#sv_master1 ""
# ------------------------------------------------------------------------------
# PERMISSÕES E ADMINISTRADORES
# ------------------------------------------------------------------------------
add_ace group.admin command allow
add_ace group.admin command.quit deny

# Adicione seus identificadores de administrador aqui
# Formato: add_principal identifier.steam:SEU_STEAM_ID group.admin
# Formato: add_principal identifier.fivem:SEU_FIVEM_ID group.admin
# Formato: add_principal identifier.discord:SEU_DISCORD_ID group.admin
add_principal identifier.steam:11000013f63a190 group.admin
# ------------------------------------------------------------------------------
# ONESYNC (Sincronização Avançada)
# ------------------------------------------------------------------------------
set onesync on
set onesync_population true
set sv_enforceGameBuild 3751
set onesync_forceMigration true
set onesync_workaround763185 true
set onesync_distanceCullVehicles true
# ------------------------------------------------------------------------------
# OTIMIZAÇÕES DE PERFORMANCE
# ------------------------------------------------------------------------------
increase_pool_size "CMoveObject" 75
increase_pool_size "FragmentStore" 14000
increase_pool_size "OcclusionInteriorInfo" 20
increase_pool_size "OcclusionPathNode" 5000
increase_pool_size "OcclusionPortalEntity" 750
increase_pool_size "OcclusionPortalInfo" 750
increase_pool_size "PortalInst" 225
increase_pool_size "ScaleformStore" 200
increase_pool_size "StaticBounds" 5000
increase_pool_size "TxdStore" 26000
# ------------------------------------------------------------------------------
# CONFIGURAÇÕES DE VOZ (MUMBLE)
# ------------------------------------------------------------------------------
setr profile_skfx 0
setr voice_syncData 1
setr voice_useNativeAudio true
set mumble_maxClientsPerIP 1024
setr voice_useSendingRangeOnly true
# ------------------------------------------------------------------------------
# INFORMAÇÕES DO SERVIDOR
# ------------------------------------------------------------------------------
sv_hostname "Creative Network"
sets sv_projectName "Creative Network"
sets sv_projectDesc "Desenvolva sua historia, troque seu tiro e divirta-se"

sets Grupo "Creative Network"
sets Desenvolvedor "Vitor Oliveira"
sets Discord "https://creativenetwork.dev.br/"
# Banners do servidor (opcional)
sets banner_detail ""
sets banner_connecting ""
# ------------------------------------------------------------------------------
# LIMITE DE JOGADORES
# ------------------------------------------------------------------------------
sv_maxClients 7
# ------------------------------------------------------------------------------
# CHAVES DE API (OBRIGATÓRIO)
# ------------------------------------------------------------------------------
# Steam Web API Key - Obtenha em: https://steamcommunity.com/dev/apikey
set steam_webApiKey ""
# License Key da CFX - Obtenha em: https://keymaster.fivem.net/
sv_licenseKey ""
# ------------------------------------------------------------------------------
# WEBHOOKS DISCORD (OBRIGATÓRIO)
# ------------------------------------------------------------------------------
setr Discord_MDT ""
setr Discord_PAINEL ""
setr Fivemanage ""